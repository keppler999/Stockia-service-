name: Build Android APK (Gratuit)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Prebuild (Expo -> Android natif)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stockia-v3-android
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: mapping-file
          path: android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/app/build/outputs/logs/
          retention-days: 7
